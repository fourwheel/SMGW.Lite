[common]
lib_deps =
    prampec/IotWebConf@^3.2.1
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    arduino-libraries/NTPClient@^3.2.1
    ESP32Async/ESPAsyncWebServer@^3.7.7
    ESP32Async/AsyncTCP@^3.4.0
    bblanchon/ArduinoJson@^7.0.4
build_flags_common =
    -D RX_PIN=3
    -D TX_PIN=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ; Debug build — full Serial output, verbose IDF logging
; [env:esp32c3_debug]
; platform = espressif32
; board = esp32-c3-devkitm-1
; framework = arduino
; monitor_speed = 115200
; upload_speed = 921600
; build_flags =
;     ${common.build_flags_common}
;     -DCORE_DEBUG_LEVEL=5
;     -DSERIAL_DEBUG
; lib_deps = ${common.lib_deps}

; ; Release build — Serial output stripped at compile time
; [env:esp32c3]
; platform = espressif32
; board = esp32-c3-devkitm-1
; framework = arduino
; monitor_speed = 115200
; upload_speed = 921600
; build_flags =
;     ${common.build_flags_common}
;     -DCORE_DEBUG_LEVEL=0
; lib_deps = ${common.lib_deps}
; upload_protocol = espota
; upload_port = 192.168.0.5

; Debug build — full Serial output, verbose IDF logging
[env:esp32-nodemcu_debug]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -D RX_PIN=15
    -D TX_PIN=16
    -DCORE_DEBUG_LEVEL=5
    -DSERIAL_DEBUG
lib_deps = ${common.lib_deps}
upload_protocol = espota
upload_port = 192.168.0.8

; ; Release build — Serial output stripped at compile time
; [env:esp32-nodemcu]
; platform = espressif32
; board = esp32dev
; framework = arduino
; monitor_speed = 115200
; upload_speed = 921600
; build_flags =
;     -D RX_PIN=15
;     -D TX_PIN=16
;     -DCORE_DEBUG_LEVEL=0
; lib_deps = ${common.lib_deps}
; upload_protocol = espota
; upload_port = 192.168.0.8
